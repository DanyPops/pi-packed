name: Publish Package

# Trusted publishing (OIDC): no long-lived npm tokens. npm CLI detects the
# OIDC environment automatically (requires npm >= 11.5.1). Configure the
# trusted publisher on npmjs.com: org=DanyPops repo=pi-packed workflow=publish.yml

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - run: bun test

      # npm CLI only for the publish step (trusted publishing needs >= 11.5.1).
      # NO registry-url here: it makes setup-node write an .npmrc with an empty
      # NODE_AUTH_TOKEN line, which shadows OIDC auto-detection and breaks
      # trusted publishing with a 404.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Debug OIDC env presence
        run: |
          echo "GITHUB_ACTIONS=${GITHUB_ACTIONS}"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL=${ACTIONS_ID_TOKEN_REQUEST_URL:+SET}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN=${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+SET}"

      # Trusted publishing needs npm >= 11.5.1; Node's bundled npm can be older.
      - run: npm install -g npm@latest && npm --version

      # verbose: surfaces the OIDC token-exchange error body (log.verbose otherwise)
      - run: npm publish --access public --loglevel verbose
